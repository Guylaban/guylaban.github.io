name: Deploy to GitHub Pages

# Publishes the static site to GitHub Pages on every push to the default branch
# (and on demand). Uses the GitHub Actions Pages flow, so no branch/folder
# settings are needed — it auto-enables Pages on the first run.

on:
  push:
    branches: [main, master, claude/add-conference-rankings-OnzzT, claude/focused-goodall-Gyse6]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
